name: Check Release Created

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  check-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify release was created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Derive tag: prefer a v* tag pointing at the head SHA,
          # fall back to package.json version.
          TAG=$(git tag --points-at "$HEAD_SHA" | grep '^v' | head -1)
          if [ -z "$TAG" ]; then
            VERSION=$(jq -r '.version' package.json)
            TAG="v${VERSION}"
            echo "No tag found at commit; derived tag from package.json: $TAG"
          else
            echo "Tag found at commit: $TAG"
          fi
          FOUND_TAG=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.tag_name' 2>/dev/null || echo "")
          if [ "$FOUND_TAG" = "$TAG" ]; then
            echo "Release $TAG was successfully created."
          else
            echo "Release $TAG was NOT found!"
            exit 1
          fi
