# DISABLED – Chrome Web Store publication not used.
# The extension uses streaming/download functionality not permitted by Chrome Web Store policy.
# Distribution is via GitHub Releases (.zip) + manual "Load unpacked" installation.
# See chrome-ext/README-chrome.md for installation instructions.
#
# This file is kept for reference only. It will NOT run automatically.
# To re-enable, restore the `release:` trigger below.
name: Publish Chrome Extension (Disabled)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v1.2.3)"
        required: false
        type: string

jobs:
  publish:
    if: false # DISABLED — kept for reference only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        id: build
        run: |
          cd chrome-ext
          VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' manifest.json | head -1)
          ZIP="ha-yt-dlp-chrome-ext-${VERSION}.zip"
          zip -r "$ZIP" . -x "*.zip" -x ".git*" -x "*.gitkeep" -x "build-zip.sh" -x "screenshots/*" -x "README-chrome.md"
          echo "zip_path=chrome-ext/${ZIP}" >> $GITHUB_OUTPUT

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload-action@v5.0.0
        with:
          file-path: ${{ steps.build.outputs.zip_path }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
